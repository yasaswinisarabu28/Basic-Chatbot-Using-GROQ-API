
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yasaswini's AI Chatbot</title>

    <style>
    /* Reset and base */
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: Arial, sans-serif;
    }

    body {
        background-color: #f0f2f5;
        display: flex;
        flex-direction: column;
        align-items: center;
        height: 100vh;
    }

    /* Header */
    #header {
        background-color: #075e54;
        color: white;
        width: 100%;
        padding: 15px;
        text-align: center;
    }

    /* Personality selector */
    #personality-div {
        width: 500px;
        padding: 10px;
        background: white;
        border-bottom: 1px solid #ddd;
    }

    #personality {
        width: 100%;
        padding: 8px;
        border-radius: 5px;
        border: 1px solid #ddd;
        font-size: 14px;
    }

    /* Chatbox */
    #chatbox {
        width: 500px;
        height: 400px;
        overflow-y: auto;
        padding: 15px;
        background: white;
        display: flex;
        flex-direction: column;
        gap: 10px;
    }

    /* Messages */
    .user-message {
        background-color: #dcf8c6;
        padding: 10px 15px;
        border-radius: 10px;
        max-width: 80%;
        align-self: flex-end;
        font-size: 14px;
    }

    .ai-message {
        background-color: #f0f0f0;
        padding: 10px 15px;
        border-radius: 10px;
        max-width: 80%;
        align-self: flex-start;
        font-size: 14px;
    }

    /* Input area */
    #input-area {
        width: 500px;
        padding: 10px;
        background: white;
        display: flex;
        gap: 8px;
        border-top: 1px solid #ddd;
    }

    #messageInput {
        flex: 1;
        padding: 10px;
        border-radius: 20px;
        border: 1px solid #ddd;
        font-size: 14px;
        outline: none;
    }

    button {
        padding: 10px 20px;
        border: none;
        border-radius: 20px;
        cursor: pointer;
        font-size: 14px;
    }

    #send-btn {
        background-color: #075e54;
        color: white;
    }

    #clear-btn {
        background-color: #ff4444;
        color: white;
    }
</style>
</head>
<body>

    <!-- Header -->
    <div id="header">
        <h1>🤖 Yasaswini's AI Chatbot</h1>
    </div>

    <!-- Personality Selector -->
    <div id="personality-div">
        <select id="personality">
            <option value="1">🎯 Interview Coach</option>
            <option value="2">📄 Resume Reviewer</option>
            <option value="3">🐍 GenAI Tutor</option>
            <option value="4">📚 Study Planner</option>
        </select>
    </div>

    <!-- Chat Box -->
    <div id="chatbox">
        <!-- messages appear here -->
    </div>

    <!-- Input Area -->
    <div id="input-area">
        <input type="text" id="messageInput" placeholder="Type your message...">
        <button id="send-btn" onclick="sendMessage()">Send</button>
<button id="clear-btn" onclick="clearChat()">Clear</button>
    </div>

    <script>
    // Send message function
    async function sendMessage() {
        // Step 1: Get user input
        const message = document.getElementById("messageInput").value.trim();
        const personality = document.getElementById("personality").value;
        
        // Step 2: Check empty input
        if (message === "") {
            alert("Please type something!");
            return;
        }
        
        // Step 3: Show user message in chatbox
        addMessage(message, "user");
        
        // Step 4: Clear input box
        document.getElementById("messageInput").value = "";
        
        // Step 5: Send to Flask
        try {
            const response = await fetch("/chat", {
                method: "POST",
                headers: {"Content-Type": "application/json"},
                body: JSON.stringify({
                    message: message,
                    personality: personality
                })
            });
            
            const data = await response.json();
            
            // Step 6: Show AI reply
            addMessage(data.reply, "ai");
        
        } catch (error) {
            addMessage("Error! Please try again.", "ai");
        }
    }

    // Add message to chatbox
    function addMessage(text, sender) {
        const chatbox = document.getElementById("chatbox");
        
        // Create message div
        const messageDiv = document.createElement("div");
        
        // Add correct class based on sender
        if (sender === "user") {
            messageDiv.className = "user-message";
        } else {
            messageDiv.className = "ai-message";
        }
        
        // Add text
        messageDiv.innerText = text;
        
        // Add to chatbox
        chatbox.appendChild(messageDiv);
        
        // Auto scroll to bottom
        chatbox.scrollTop = chatbox.scrollHeight;
    }

    // Clear chat function
    async function clearChat() {
        // Clear chatbox on screen
        document.getElementById("chatbox").innerHTML = "";
        
        // Clear history in Flask
        await fetch("/clear", {
            method: "POST",
            headers: {"Content-Type": "application/json"}
        });
    }

    // Send message when Enter key pressed
    document.getElementById("messageInput").addEventListener("keypress", function(e) {
        if (e.key === "Enter") {
            sendMessage();
        }
    });
</script>

</body>
</html>
